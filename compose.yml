services:
  frontend:
    container_name: jobsearchagent-frontend
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend-dev
    volumes:
      - ./:/app/frontend
      - /app/frontend/node_modules
    environment:
      - VITE_API_BASE_URL=http://jobsearchagent.local/api
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jobsearchagent-frontend.rule=Host(`jobsearchagent.local`)"
      - "traefik.http.routers.jobsearchagent-frontend.priority=1"
      - "traefik.http.services.jobsearchagent-frontend.loadbalancer.server.port=5173"
      - "traefik.http.routers.jobsearchagent-frontend.entrypoints=web"
    expose:
      - 5173
    networks:
      - traefik-network
    restart: unless-stopped

networks:
  traefik-network:
    external: true
