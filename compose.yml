services:
  frontend:
    container_name: job-search-agent-frontend
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend-dev
    volumes:
      - ./:/app/frontend
      - /app/frontend/node_modules
    environment:
      - VITE_API_BASE_URL=http://job-search-agent.local/api
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.job-search-agent-frontend.rule=Host(`job-search-agent.local`)"
      - "traefik.http.routers.job-search-agent-frontend.priority=1"
      - "traefik.http.services.job-search-agent-frontend.loadbalancer.server.port=5173"
      - "traefik.http.routers.job-search-agent-frontend.entrypoints=web"
    expose:
      - 5173
    networks:
      - traefik-network
    restart: unless-stopped

networks:
  traefik-network:
    external: true
